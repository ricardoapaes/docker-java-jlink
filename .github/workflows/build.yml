name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      java_version:
        description: 'Java version (e.g. 21.0.7)'
        required: true
        default: '21.0.7'
      java_build:
        description: 'Java build number (e.g. 6)'
        required: true
        default: '6'
      java_version_x86:
        description: 'Java x86-32 version (e.g. 17.0.17, only for Java 11/17)'
        required: false
        default: ''
      java_build_x86:
        description: 'Java x86-32 build number (e.g. 10, only for Java 11/17)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'matrix={"include":[{"java_version":"${{ github.event.inputs.java_version }}","java_build":"${{ github.event.inputs.java_build }}","java_version_x86":"${{ github.event.inputs.java_version_x86 }}","java_build_x86":"${{ github.event.inputs.java_build_x86 }}","is_latest":false}]}' >> "$GITHUB_OUTPUT"
          else
            MATRIX='{"include":['
            MATRIX+='{"java_version":"11.0.30","java_build":"7","java_version_x86":"11.0.29","java_build_x86":"7","is_latest":false},'
            MATRIX+='{"java_version":"17.0.18","java_build":"8","java_version_x86":"17.0.17","java_build_x86":"10","is_latest":false},'
            MATRIX+='{"java_version":"21.0.7","java_build":"6","is_latest":false},'
            MATRIX+='{"java_version":"25.0.2","java_build":"10","is_latest":true}'
            MATRIX+=']}'
            echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve Java version and build
        id: vars
        run: |
          JAVA_MAJOR="${{ matrix.java_version }}"
          JAVA_MAJOR="${JAVA_MAJOR%%.*}"
          echo "java_version=${{ matrix.java_version }}"         >> "$GITHUB_OUTPUT"
          echo "java_build=${{ matrix.java_build }}"             >> "$GITHUB_OUTPUT"
          echo "java_major=${JAVA_MAJOR}"                        >> "$GITHUB_OUTPUT"
          echo "java_version_x86=${{ matrix.java_version_x86 }}" >> "$GITHUB_OUTPUT"
          echo "java_build_x86=${{ matrix.java_build_x86 }}"     >> "$GITHUB_OUTPUT"

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.java_major }}
            type=raw,value=${{ steps.vars.outputs.java_version }}_${{ steps.vars.outputs.java_build }}
            type=raw,value=latest,enable=${{ matrix.is_latest == true && github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JAVA_VERSION=${{ steps.vars.outputs.java_version }}
            JAVA_BUILD=${{ steps.vars.outputs.java_build }}
            JAVA_VERSION_X86=${{ steps.vars.outputs.java_version_x86 }}
            JAVA_BUILD_X86=${{ steps.vars.outputs.java_build_x86 }}
